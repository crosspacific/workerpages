name: Fetch and Update Cloudflare IP

on:
  workflow_dispatch: 
  schedule:
    - cron: '27 */2 * * *' 

permissions:
  contents: write

# 在这里添加全局环境变量，告诉 GitHub 强制使用 Node.js 24 运行所有插件
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码仓库
      # 升级到 v4 (支持更先进的 Node 版本)
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      # 升级到 v5 (这是目前的最新稳定版)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖和浏览器内核
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests
        playwright install chromium

    - name: 运行提取并更新 DNS
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        CF_RECORD_NAME: ${{ secrets.CF_RECORD_NAME }}
      run: python get_ip.py

    - name: 提交 IP.txt 到代码库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add IP.txt
        git commit -m "Auto-update IP and DNS" || echo "IP 未发生变化，跳过提交"
        git push
