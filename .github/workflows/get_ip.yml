name: Fetch and Update Cloudflare IP

on:
  workflow_dispatch: # 允许手动点击运行
  schedule:
    - cron: '*/20 * * * *' # 每 20 分钟自动执行一次全套流程

permissions:
  contents: write

jobs:
  run-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖和浏览器内核
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests
        playwright install chromium

    - name: 运行提取并更新 DNS
      env:
        # 将 GitHub Secrets 映射为 Python 可以读取的环境变量
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        CF_RECORD_NAME: ${{ secrets.CF_RECORD_NAME }}
      run: python get_ip.py

    - name: 提交 IP.txt 到代码库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add IP.txt
        git commit -m "Auto-update IP and DNS" || echo "IP 未发生变化，跳过提交"
        git push
