name: Fetch and Update Cross-Domain IPs

on:
  workflow_dispatch: 
  schedule:
    - cron: '27 */3 * * *' 

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests
        playwright install chromium

    - name: 运行提取并更新 DNS
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        # 域名 1 配置
        CF_ZONE_ID_1: ${{ secrets.CF_ZONE_ID_1 }}
        CF_RECORD_NAME_1: ${{ secrets.CF_RECORD_NAME_1 }}
        # 域名 2 配置
        CF_ZONE_ID_2: ${{ secrets.CF_ZONE_ID_2 }}
        CF_RECORD_NAME_2: ${{ secrets.CF_RECORD_NAME_2 }}
      run: python get_ip.py

    - name: 提交 IP.txt
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add IP.txt
        git commit -m "Update IPs for abc.com and xyz.com" || echo "No changes"
        git push
